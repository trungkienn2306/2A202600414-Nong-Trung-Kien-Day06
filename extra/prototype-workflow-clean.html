<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Learning Co-pilot - Interactive Prototype</title>
  <style>
    :root {
      --bg: #1b2028;
      --panel: #1f2630;
      --panel-2: #202833;
      --line: #2f3844;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --chip: #111827;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 10px;
      padding: 10px;
    }
    .left, .right {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }
    .head {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: #1d242e;
      font-weight: 600;
    }
    .sources-body {
      padding: 12px;
      display: grid;
      gap: 12px;
      height: calc(100% - 52px);
      grid-template-rows: auto auto 1fr;
    }
    .btn-add {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    .search-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #1b232d;
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .search-input {
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      width: 100%;
    }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--chip);
      color: #d1d5db;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .empty-sources {
      border: 1px dashed var(--line);
      border-radius: 14px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 20px;
      line-height: 1.5;
    }
    .right {
      display: grid;
      grid-template-rows: 52px 1fr auto;
      min-width: 0;
    }
    .chat-area {
      padding: 18px;
      overflow: auto;
      background: linear-gradient(180deg, #1f2630, #1a212b);
    }
    .chat-thread {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }
    .msg {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: start;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      background: #131922;
      color: #cbd5e1;
    }
    .bubble {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
      padding: 12px 13px;
      line-height: 1.5;
      font-size: 14px;
    }
    .bubble.user {
      background: #1b334f;
      border-color: #2b4b70;
    }
    .bubble h3 { margin: 0 0 6px; font-size: 14px; }
    .bubble p { margin: 0; }
    .bubble ul { margin: 8px 0 0; padding-left: 18px; }
    .chat-empty {
      max-width: 820px;
      margin: 60px auto 0;
      text-align: center;
      color: var(--muted);
      display: grid;
      gap: 10px;
      justify-items: center;
    }
    .upload-main {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      padding: 9px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 12px;
      background: #1d242e;
    }
    .composer-inner {
      max-width: 860px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #151b24;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .prompt {
      border: none;
      resize: none;
      outline: none;
      width: 100%;
      min-height: 56px;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      background: #111827;
      color: #d1d5db;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn.accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; height: auto; }
      .left { min-height: 360px; }
      .right { min-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="left">
      <div class="head">
        <span>Nguồn</span>
        <span>☰</span>
      </div>
      <div class="sources-body">
        <button class="btn-add">＋ Thêm nguồn</button>
        <div class="search-card">
          <input class="search-input" value="Tìm nguồn mới trên web" readonly />
          <div class="chips">
            <button class="chip">🌐 Web</button>
            <button class="chip">⚡ Nghiên cứu nhanh</button>
            <button class="chip">➜</button>
          </div>
        </div>
        <div class="empty-sources">
          <div>
            <p><strong>Nguồn đã lưu sẽ xuất hiện tại đây</strong></p>
            <p>Nhấn “Thêm nguồn” để thêm PDF, trang web, văn bản, video hoặc âm thanh.</p>
          </div>
        </div>
      </div>
    </aside>

    <section class="right">
      <div class="head">
        <span id="screenTitle">AI Learning Co-pilot - Interactive Prototype</span>
        <span id="screenBadge">Bước 1/6</span>
      </div>

      <div class="chat-area">
        <div class="chat-empty" id="chatEmpty">
          <div style="font-size:24px;">⤴</div>
          <h2 style="margin:0; font-size:36px; font-weight:500;">Thêm nguồn để bắt đầu</h2>
          <button class="upload-main">Tải nguồn lên</button>
        </div>
        <div class="chat-thread" id="thread" style="display:none;"></div>
      </div>

      <footer class="composer">
        <div class="composer-inner">
          <textarea class="prompt" id="promptBox" readonly></textarea>
          <div class="composer-actions">
            <div class="actions">
              <button class="btn" id="backBtn">Lùi</button>
              <button class="btn" id="replayBtn">Chạy lại</button>
            </div>
            <div class="actions">
              <button class="btn" id="nextBtn">Tiếp</button>
              <button class="btn accent">Gửi</button>
            </div>
          </div>
        </div>
      </footer>
    </section>
  </div>

  <script>
    const steps = [
      {
        name: "1. Tải tài liệu",
        prompt: "Em tải file Toán12_Chương3.pdf, giúp em bắt đầu ôn tập nhé.",
        messages: [
          { role: "user", html: "<p>Em tải file <strong>Toán12_Chương3.pdf</strong>. Giúp em ôn nhanh trong 15 phút.</p>" },
          { role: "ai", html: "<h3>Đã nhận tài liệu</h3><p>File PDF 42 trang đã xử lý xong. <strong>doc_id: DOC-2026-0410-001</strong>.</p>" }
        ]
      },
      {
        name: "2. Rà soát nguồn",
        prompt: "Cho em xem dàn ý trước khi tóm tắt.",
        messages: [
          { role: "user", html: "<p>Cho em xem dàn ý và báo đoạn nào cần kiểm tra lại.</p>" },
          { role: "ai", html: "<h3>Dàn ý tài liệu</h3><ul><li>Chương 1: Hàm số</li><li>Chương 2: Giới hạn</li><li><strong>Chương 3: Đạo hàm</strong></li></ul><p>Có 2 đoạn công thức ở trang 18-19 độ tin cậy thấp.</p>" }
        ]
      },
      {
        name: "3. Tóm tắt",
        prompt: "Tóm tắt chương 3 theo dạng key points.",
        messages: [
          { role: "user", html: "<p>Tóm tắt chương 3 cho em theo key points.</p>" },
          { role: "ai", html: "<h3>Tóm tắt</h3><ul><li>Khái niệm đạo hàm</li><li>Quy tắc đạo hàm cơ bản</li><li>Ý nghĩa hình học</li></ul><p><strong>Trích nguồn:</strong> chunk_31, chunk_37.</p>" }
        ]
      },
      {
        name: "4. Quiz",
        prompt: "Tạo quiz 5 câu mức độ trung bình.",
        messages: [
          { role: "user", html: "<p>Tạo bộ quiz 5 câu để em tự kiểm tra.</p>" },
          { role: "ai", html: "<h3>Đã tạo quiz</h3><ul><li>C1: Định nghĩa đạo hàm tại x0</li><li>C2: Tính đạo hàm f(x)=x^3-3x+2</li><li>C3: Ý nghĩa hình học của f'(x)</li></ul><p>Điểm giả lập hiện tại: <strong>8.2/10</strong>.</p>" }
        ]
      },
      {
        name: "5. Gợi ý",
        prompt: "Em bí câu 3, cho em gợi ý tăng dần nhé.",
        messages: [
          { role: "user", html: "<p>Em bí câu 3, cho em gợi ý thay vì đáp án trực tiếp.</p>" },
          { role: "ai", html: "<h3>Gợi ý theo cấp</h3><ul><li><strong>L1:</strong> Liên hệ đạo hàm với độ dốc tiếp tuyến.</li><li><strong>L2:</strong> Nếu đồ thị tăng thì f'(x) thường có dấu gì?</li><li><strong>L3:</strong> f'(x0) là hệ số góc tiếp tuyến tại x0.</li></ul>" }
        ]
      },
      {
        name: "6. Phản hồi",
        prompt: "Cho em tổng kết buổi học và gửi phản hồi.",
        messages: [
          { role: "user", html: "<p>Cho em tổng kết nhanh và tạo phản hồi cho phần em chưa ổn.</p>" },
          { role: "ai", html: "<h3>Hoàn tất phiên học</h3><p>Điểm giả lập cuối: <strong>8.6/10</strong>. Mã phản hồi: FB-8821.</p><p>Cảm ơn bạn! Hệ thống sẽ học từ phản hồi này.</p>" }
        ]
      }
    ];

    let current = 0;
    const screenTitle = document.getElementById("screenTitle");
    const screenBadge = document.getElementById("screenBadge");
    const thread = document.getElementById("thread");
    const chatEmpty = document.getElementById("chatEmpty");
    const promptBox = document.getElementById("promptBox");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const replayBtn = document.getElementById("replayBtn");

    function renderThread() {
      if (current === 0) {
        chatEmpty.style.display = "grid";
        thread.style.display = "none";
      } else {
        chatEmpty.style.display = "none";
        thread.style.display = "grid";
      }
      thread.innerHTML = "";
      steps[current].messages.forEach((m) => {
        const row = document.createElement("article");
        row.className = "msg";
        const av = document.createElement("div");
        av.className = "avatar";
        av.textContent = m.role === "user" ? "U" : "AI";
        const bb = document.createElement("div");
        bb.className = "bubble " + (m.role === "user" ? "user" : "");
        bb.innerHTML = m.html;
        row.appendChild(av);
        row.appendChild(bb);
        thread.appendChild(row);
      });
    }

    function render() {
      screenTitle.textContent = "AI Learning Co-pilot - Interactive Prototype";
      screenBadge.textContent = `Bước ${current + 1}/${steps.length} - ${steps[current].name}`;
      promptBox.value = steps[current].prompt;
      backBtn.disabled = current === 0;
      nextBtn.textContent = current === steps.length - 1 ? "Kết thúc" : "Tiếp";
      renderThread();
    }

    backBtn.onclick = () => { if (current > 0) { current -= 1; render(); } };
    nextBtn.onclick = () => {
      if (current < steps.length - 1) {
        current += 1;
        render();
      } else {
        alert("Đã đi hết workflow MVP. Nhấn Chạy lại để xem lại.");
      }
    };
    replayBtn.onclick = () => { current = 0; render(); };

    render();
  </script>
</body>
</html>
